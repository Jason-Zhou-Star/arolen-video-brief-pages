function b64ToBytes(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
async function deriveKey(password, salt) {
  const material = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: payload.iterations, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}
async function openDocument() {
  const error = document.getElementById("error");
  error.textContent = "";
  const password = document.getElementById("password").value;
  if (!password) { error.textContent = "请输入访问密码。"; return; }
  try {
    const key = await deriveKey(password, b64ToBytes(payload.salt));
    const cipher = b64ToBytes(payload.ciphertext);
    const tag = b64ToBytes(payload.tag);
    const combined = new Uint8Array(cipher.length + tag.length);
    combined.set(cipher);
    combined.set(tag, cipher.length);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(payload.iv) }, key, combined);
    if (!("DecompressionStream" in window)) {
      error.textContent = "当前浏览器不支持解压显示，请换用新版 Chrome、Edge 或 Safari。";
      return;
    }
    const html = new TextDecoder().decode(await new Response(
      new Blob([plain]).stream().pipeThrough(new DecompressionStream("gzip"))
    ).arrayBuffer());
    const viewer = document.getElementById("viewer");
    viewer.srcdoc = html;
    viewer.style.display = "block";
    document.getElementById("gate").style.display = "none";
  } catch {
    error.textContent = "密码不正确，请重新输入。";
  }
}
document.getElementById("openBtn").addEventListener("click", openDocument);
document.getElementById("password").addEventListener("keydown", event => {
  if (event.key === "Enter") openDocument();
});
